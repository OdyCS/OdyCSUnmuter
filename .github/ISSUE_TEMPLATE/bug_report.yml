name: Bug report
description: Report a build, rewrite, or playback problem
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not upload demos containing private voice communications unless you have permission.

  - type: input
    id: version
    attributes:
      label: Patcher version
      placeholder: v0.1.0-beta.1
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Demo source
      options:
        - FACEIT
        - Tournament GOTV
        - Valve matchmaking
        - Other
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Complete relevant console output
      description: You may redact original Steam IDs before posting.
      render: text
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: Expected and actual playback behavior
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I used an untouched original demo as input.
          required: true
        - label: The original demo plays correctly in CS2.
          required: true
        - label: I tested the newly generated `_OdyCSunmuted.dem` file.
          required: true
